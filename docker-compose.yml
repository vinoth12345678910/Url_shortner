version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: url-shortener-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: urlshortener
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  # Backend API
  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: url-shortener-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URL=mongodb://admin:password123@mongodb:27017/urlshortener?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-here-change-this
      - BASE_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - app-network

  # Frontend
  frontend:
    build:
      context: ./client/url_frontend
      dockerfile: Dockerfile
    container_name: url-shortener-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge